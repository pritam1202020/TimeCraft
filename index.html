<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeCraft — Stopwatch, Timer & Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --surface: rgba(255,255,255,0.04);
    --surface2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f5;
    --text2: #9090a8;
    --text3: #5a5a72;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --accent-glow: rgba(124,106,247,0.3);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.15);
    --orange: #fb923c;
    --orange-dim: rgba(251,146,60,0.15);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.15);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.15);
    --radius: 16px;
    --radius-sm: 10px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  .light {
    --bg: #f5f5fa;
    --bg2: #ededf5;
    --bg3: #e5e5f0;
    --surface: rgba(0,0,0,0.03);
    --surface2: rgba(0,0,0,0.06);
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.15);
    --text: #0a0a1a;
    --text2: #5a5a72;
    --text3: #9090a8;
    --accent: #6d59f0;
    --accent2: #8b6ff5;
    --accent-glow: rgba(109,89,240,0.2);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background var(--transition), color var(--transition); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; background: rgba(10,10,15,0.8); }
  .light .header { background: rgba(245,245,250,0.8); }
  .logo { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.8)} }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .btn-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: all var(--transition); }
  .btn-icon:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  /* TABS */
  .tabs { display: flex; align-items: center; gap: 4px; padding: 1.5rem 2rem 0; }
  .tab { padding: 0.5rem 1.25rem; border-radius: 8px; border: none; background: transparent; color: var(--text2); font-family: var(--font); font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all var(--transition); position: relative; }
  .tab.active { background: var(--surface2); color: var(--text); }
  .tab.active::after { content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: var(--accent); border-radius: 1px; }
  .tab:hover:not(.active) { color: var(--text); background: var(--surface); }

  /* PANELS */
  .panel { display: none; padding: 1.5rem 2rem 2rem; animation: fadeIn 0.3s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* HINT */
  .hint { display: inline-flex; align-items: center; gap: 8px; padding: 0.5rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; font-size: 0.8rem; color: var(--text2); margin-bottom: 1.5rem; }
  .hint-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }

  /* STOPWATCH */
  .sw-center { display: flex; flex-direction: column; align-items: center; gap: 2rem; }
  .ring-wrap { position: relative; width: 260px; height: 260px; }
  .ring-svg { width: 260px; height: 260px; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
  .ring-progress { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 723; stroke-dashoffset: 723; transition: stroke-dashoffset 0.1s linear; filter: drop-shadow(0 0 8px var(--accent-glow)); }
  .ring-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .sw-time { font-family: var(--mono); font-size: 2.8rem; font-weight: 500; letter-spacing: -0.02em; line-height: 1; }
  .sw-ms { font-family: var(--mono); font-size: 1.2rem; color: var(--accent2); }
  .sw-label { font-size: 0.75rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }

  /* CONTROLS */
  .controls { display: flex; align-items: center; gap: 12px; }
  .btn { padding: 0.65rem 1.5rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--font); font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all var(--transition); }
  .btn:hover { background: var(--surface2); border-color: var(--border2); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); filter: brightness(1.1); }
  .btn-lg { padding: 0.85rem 2.5rem; font-size: 1rem; border-radius: var(--radius); }
  .btn-round { width: 56px; height: 56px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
  .btn-danger { background: var(--red-dim); border-color: rgba(248,113,113,0.3); color: var(--red); }
  .btn-success { background: var(--green-dim); border-color: rgba(52,211,153,0.3); color: var(--green); }

  /* LAPS */
  .laps { width: 100%; max-width: 400px; max-height: 220px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .lap-header { display: grid; grid-template-columns: 40px 1fr 1fr; padding: 0.6rem 1rem; font-size: 0.75rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); background: var(--surface); }
  .lap-row { display: grid; grid-template-columns: 40px 1fr 1fr; padding: 0.6rem 1rem; font-size: 0.875rem; border-bottom: 1px solid var(--border); transition: background var(--transition); animation: slideIn 0.2s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
  .lap-row:last-child { border-bottom: none; }
  .lap-row:hover { background: var(--surface); }
  .lap-row.fastest { color: var(--green); }
  .lap-row.slowest { color: var(--red); }
  .lap-num { color: var(--text3); }
  .lap-split { font-family: var(--mono); }
  .lap-total { font-family: var(--mono); color: var(--text2); }

  /* TIMER GRID */
  .timer-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
  .presets { display: flex; gap: 8px; flex-wrap: wrap; }
  .preset { padding: 0.4rem 0.9rem; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: var(--font); font-size: 0.8rem; cursor: pointer; transition: all var(--transition); }
  .preset:hover { background: var(--accent); border-color: var(--accent); color: #fff; transform: scale(1.05); }
  .timers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .timer-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; position: relative; overflow: hidden; transition: all var(--transition); animation: fadeIn 0.3s ease; }
  .timer-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .timer-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transform: scaleX(0); transform-origin: left; transition: transform 0.3s ease; }
  .timer-card.running::before { transform: scaleX(1); }
  .timer-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .timer-name { font-size: 0.9rem; font-weight: 500; color: var(--text2); }
  .timer-display { font-family: var(--mono); font-size: 2.2rem; font-weight: 500; letter-spacing: -0.02em; text-align: center; margin: 0.75rem 0; transition: color var(--transition); }
  .timer-display.urgent { color: var(--red); animation: urgentPulse 0.5s infinite alternate; }
  @keyframes urgentPulse { from{opacity:1} to{opacity:0.5} }
  .timer-progress { height: 4px; background: var(--border); border-radius: 2px; margin: 0.75rem 0; overflow: hidden; }
  .timer-progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 1s linear; }
  .timer-controls { display: flex; gap: 8px; justify-content: center; align-items: center; }
  .timer-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
  .timer-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; transform: scale(1.1); }
  .timer-btn.close { color: var(--text3); }
  .timer-btn.close:hover { background: var(--red-dim); border-color: rgba(248,113,113,0.3); color: var(--red); }
  .add-timer { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; height: 160px; border: 2px dashed var(--border); border-radius: var(--radius); cursor: pointer; transition: all var(--transition); color: var(--text3); font-size: 0.9rem; }
  .add-timer:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); transform: scale(1.01); }
  .add-timer .plus { font-size: 2rem; line-height: 1; }

  /* TIMER SETUP */
  .timer-setup { display: flex; align-items: flex-start; gap: 8px; justify-content: center; margin-bottom: 0.75rem; }
  .time-spin { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .time-input { width: 58px; text-align: center; font-family: var(--mono); font-size: 1.3rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0.4rem; outline: none; transition: border-color var(--transition); -moz-appearance: textfield; appearance: textfield; }
  .time-input::-webkit-inner-spin-button, .time-input::-webkit-outer-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
  .time-input:focus { border-color: var(--accent); }
  .time-sep { font-family: var(--mono); font-size: 1.3rem; color: var(--text3); margin-top: 8px; }
  .spin-btns { display: flex; gap: 4px; }
  .spin-btn { width: 26px; height: 22px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition); padding: 0; font-family: var(--font); }
  .spin-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* COUNTDOWN */
  .countdown-top { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .countdown-form { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; flex: 0 0 320px; }
  .form-group { margin-bottom: 1rem; }
  .form-label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 0.4rem; letter-spacing: 0.03em; }
  .form-input { width: 100%; padding: 0.6rem 0.9rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--font); font-size: 0.9rem; outline: none; transition: border-color var(--transition); }
  .form-input:focus { border-color: var(--accent); }
  .theme-picks { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 0.5rem; }
  .theme-pick { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all var(--transition); }
  .theme-pick.active { border-color: white; transform: scale(1.2); }
  .countdowns-list { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 1rem; }
  .cd-card { border-radius: var(--radius); padding: 1.5rem; position: relative; overflow: hidden; animation: fadeIn 0.3s ease; transition: transform var(--transition); }
  .cd-card:hover { transform: translateY(-3px); }
  .cd-card-bg { position: absolute; inset: 0; opacity: 0.15; pointer-events: none; }
  .cd-event { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.8; margin-bottom: 0.5rem; }
  .cd-name { font-size: 1.3rem; font-weight: 600; margin-bottom: 1.25rem; }
  .cd-units { display: flex; gap: 0.75rem; }
  .cd-unit { text-align: center; flex: 1; }
  .cd-val { font-family: var(--mono); font-size: 2rem; font-weight: 500; line-height: 1; display: block; }
  .cd-lbl { font-size: 0.65rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.05em; }
  .cd-actions { display: flex; gap: 8px; margin-top: 1rem; }
  .cd-btn { padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: inherit; font-family: var(--font); font-size: 0.75rem; cursor: pointer; transition: all var(--transition); }
  .cd-btn:hover { background: rgba(255,255,255,0.2); }

  /* NOTIFICATIONS */
  .notification { position: fixed; bottom: 24px; right: 24px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; z-index: 1000; animation: slideUp 0.3s ease; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .notification.hide { animation: slideDown 0.3s ease forwards; }
  @keyframes slideDown { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(20px)} }
  .notif-icon { font-size: 1.5rem; }
  .notif-text { font-size: 0.875rem; }
  .notif-title { font-weight: 600; margin-bottom: 2px; }
  .notif-sub { color: var(--text2); font-size: 0.8rem; }

  /* FLOATING PANEL */
  .fab { position: fixed; bottom: 24px; left: 24px; z-index: 200; }
  .fab-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px var(--accent-glow); transition: all var(--transition); }
  .fab-btn:hover { transform: scale(1.1); filter: brightness(1.1); }
  .fab-menu { position: absolute; bottom: 60px; left: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.75rem; min-width: 200px; display: none; flex-direction: column; gap: 4px; animation: fadeIn 0.2s ease; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .fab-menu.open { display: flex; }
  .fab-item { padding: 0.6rem 0.75rem; border-radius: 8px; cursor: pointer; font-size: 0.875rem; color: var(--text2); transition: all var(--transition); display: flex; align-items: center; gap: 8px; border: none; background: none; font-family: var(--font); width: 100%; text-align: left; }
  .fab-item:hover { background: var(--surface2); color: var(--text); }
  .fab-emoji { font-size: 1rem; }

  /* FULLSCREEN */
  .fullscreen { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; }
  .fullscreen.open { display: flex; }
  .fs-time { font-family: var(--mono); font-size: clamp(4rem, 15vw, 12rem); font-weight: 300; letter-spacing: -0.04em; line-height: 1; }
  .fs-ms { font-family: var(--mono); font-size: clamp(1.5rem, 5vw, 4rem); color: var(--accent2); margin-top: 0.5rem; }
  .fs-exit { position: absolute; top: 1.5rem; right: 1.5rem; }

  /* MISC */
  .empty { text-align: center; padding: 3rem; color: var(--text3); font-size: 0.9rem; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.4; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 100px; font-size: 0.7rem; font-weight: 500; }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-orange { background: var(--orange-dim); color: var(--orange); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .kbd { display: inline-block; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); font-family: var(--mono); font-size: 0.7rem; color: var(--text3); }
  .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 1rem; }
  .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .header { padding: 0.75rem 1rem; }
    .tabs { padding: 1rem 1rem 0; gap: 2px; }
    .tab { padding: 0.4rem 0.75rem; font-size: 0.8rem; }
    .panel { padding: 1rem 1rem 2rem; }
    .sw-time { font-size: 2rem; }
    .countdown-form { flex: none; width: 100%; }
    .timers-grid { grid-template-columns: 1fr; }
    .ring-wrap, .ring-svg { width: 220px; height: 220px; }
  }

  /* ALERT ANIMATION */
  @keyframes completePulse { 0%,100%{box-shadow:0 0 0 0 var(--accent-glow)} 50%{box-shadow:0 0 0 20px rgba(124,106,247,0)} }
  .timer-card.complete { animation: completePulse 1s ease 3; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <span class="logo-dot"></span>
      TimeCraft
    </div>
    <div class="header-actions">
      <span style="font-size:0.75rem;color:var(--text3);padding:0 0.5rem">
        <span class="kbd">Space</span> start/pause &nbsp; <span class="kbd">L</span> lap &nbsp; <span class="kbd">R</span> reset
      </span>
      <button class="btn-icon" id="themeToggle" title="Toggle theme" style="width:auto;padding:0 12px;font-size:0.8rem;gap:6px">🌙 Dark Mode</button>
      <button class="btn-icon" id="fsBtn" title="Fullscreen stopwatch" style="width:auto;padding:0 12px;font-size:0.8rem;gap:6px">⛶ Fullscreen</button>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="stopwatch">⏱ Stopwatch</button>
    <button class="tab" data-tab="timer">⏲ Timers</button>
    <button class="tab" data-tab="countdown">📅 Countdown</button>
  </div>

  <!-- STOPWATCH PANEL -->
  <div class="panel active" id="panel-stopwatch">
    <div class="hint"><span class="hint-dot"></span> Press <strong>Space</strong> to start/pause · <strong>L</strong> to record a lap · <strong>R</strong> to reset</div>

    <div class="sw-center">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 260 260">
          <circle class="ring-bg" cx="130" cy="130" r="115"/>
          <circle class="ring-progress" id="ringProgress" cx="130" cy="130" r="115"/>
        </svg>
        <div class="ring-inner">
          <div class="sw-label">ELAPSED</div>
          <div class="sw-time" id="swDisplay">00:00</div>
          <div class="sw-ms" id="swMs">.000</div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-danger" id="swReset" title="Reset (R)" style="min-width:90px">↺ Reset</button>
        <button class="btn btn-primary btn-lg" id="swToggle" title="Start/Pause (Space)" style="min-width:120px;font-size:1rem">▶ Start</button>
        <button class="btn btn-success" id="swLap" title="Lap (L)" disabled style="min-width:90px">⧖ Lap</button>
      </div>

      <div class="laps" id="lapsTable" style="display:none">
        <div class="lap-header">
          <span>#</span><span>Split</span><span>Total</span>
        </div>
        <div id="lapsList"></div>
      </div>
    </div>
  </div>

  <!-- TIMER PANEL -->
  <div class="panel" id="panel-timer">
    <div class="timer-top">
      <div>
        <div class="section-title">Quick Presets</div>
        <div class="presets">
          <button class="preset" data-min="1">1 min</button>
          <button class="preset" data-min="5">5 min</button>
          <button class="preset" data-min="10">10 min</button>
          <button class="preset" data-min="25">🍅 25 min</button>
          <button class="preset" data-min="60">1 hour</button>
        </div>
      </div>
    </div>

    <div class="timers-grid" id="timersGrid">
      <!-- add card -->
      <div class="add-timer" id="addTimerBtn">
        <div class="plus">+</div>
        <div>Add New Timer</div>
      </div>
    </div>
  </div>

  <!-- COUNTDOWN PANEL -->
  <div class="panel" id="panel-countdown">
    <div class="countdown-top">
      <div class="countdown-form">
        <div class="section-title">Create Countdown</div>
        <div class="form-group">
          <label class="form-label">Event Name</label>
          <input type="text" class="form-input" id="cdName" placeholder="e.g. My Birthday 🎂">
        </div>
        <div class="form-group">
          <label class="form-label">Event Type</label>
          <select class="form-input" id="cdType">
            <option value="🎉">🎉 Event</option>
            <option value="🎂">🎂 Birthday</option>
            <option value="🚀">🚀 Launch</option>
            <option value="📚">📚 Exam</option>
            <option value="🎊">🎊 Festival</option>
            <option value="🎯">🎯 Deadline</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Target Date & Time</label>
          <input type="datetime-local" class="form-input" id="cdDate">
        </div>
        <div class="form-group">
          <label class="form-label">Color Theme</label>
          <div class="theme-picks">
            <div class="theme-pick active" data-theme="purple" style="background:linear-gradient(135deg,#7c6af7,#a78bfa)"></div>
            <div class="theme-pick" data-theme="teal" style="background:linear-gradient(135deg,#0d9488,#34d399)"></div>
            <div class="theme-pick" data-theme="orange" style="background:linear-gradient(135deg,#ea580c,#fb923c)"></div>
            <div class="theme-pick" data-theme="pink" style="background:linear-gradient(135deg,#db2777,#f472b6)"></div>
            <div class="theme-pick" data-theme="blue" style="background:linear-gradient(135deg,#2563eb,#60a5fa)"></div>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%" id="addCountdown">Create Countdown</button>
      </div>

      <div class="countdowns-list" id="countdownsList">
        <div class="empty" id="cdEmpty">
          <div class="empty-icon">📅</div>
          <div>No countdowns yet.<br>Create one to get started!</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- FULLSCREEN OVERLAY -->
<div class="fullscreen" id="fullscreen">
  <div class="fs-time" id="fsTime">00:00</div>
  <div class="fs-ms" id="fsMs">.000</div>
  <button class="btn btn-icon fs-exit" style="width:auto;padding:0 16px;font-size:0.875rem" onclick="closeFullscreen()">✕ Exit Fullscreen</button>
</div>

<!-- FAB -->
<div class="fab">
  <div class="fab-menu" id="fabMenu">
    <button class="fab-item" onclick="switchTab('stopwatch')"><span class="fab-emoji">⏱</span> Stopwatch</button>
    <button class="fab-item" onclick="switchTab('timer');addTimer(5)"><span class="fab-emoji">🍅</span> Quick Pomodoro</button>
    <button class="fab-item" onclick="switchTab('timer');addTimer(1)"><span class="fab-emoji">⚡</span> 1-min timer</button>
    <button class="fab-item" onclick="switchTab('countdown')"><span class="fab-emoji">📅</span> New Countdown</button>
  </div>
  <button class="fab-btn" id="fabToggle">✦</button>
</div>

<script>
// ─── TABS ────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
  fabMenu.classList.remove('open');
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

// ─── THEME ───────────────────────────────────────────────
let isDark = true;
const themeToggle = document.getElementById('themeToggle');
themeToggle.addEventListener('click', () => {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  themeToggle.textContent = isDark ? '🌙 Dark Mode' : '☀️ Light Mode';
});

// ─── FAB ─────────────────────────────────────────────────
const fabMenu = document.getElementById('fabMenu');
document.getElementById('fabToggle').addEventListener('click', () => fabMenu.classList.toggle('open'));
document.addEventListener('click', e => { if (!e.target.closest('.fab')) fabMenu.classList.remove('open'); });

// ─── STOPWATCH ───────────────────────────────────────────
let swRunning = false, swStart = 0, swElapsed = 0, swRaf = null;
let lapTimes = [], lastLapTime = 0;
const swDisplay = document.getElementById('swDisplay');
const swMs = document.getElementById('swMs');
const swToggle = document.getElementById('swToggle');
const swReset = document.getElementById('swReset');
const swLapBtn = document.getElementById('swLap');
const ring = document.getElementById('ringProgress');
const lapsTable = document.getElementById('lapsTable');
const lapsList = document.getElementById('lapsList');
const CIRC = 723;

function formatTime(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  if (h > 0) return `${pad(h)}:${pad(m)}:${pad(s)}`;
  return `${pad(m)}:${pad(s)}`;
}
function pad(n) { return String(n).padStart(2, '0'); }
function formatMs(ms) { return '.' + String(ms % 1000).padStart(3, '0'); }

function swTick() {
  swElapsed = Date.now() - swStart;
  swDisplay.textContent = formatTime(swElapsed);
  swMs.textContent = formatMs(swElapsed);
  const progress = (swElapsed % 60000) / 60000;
  ring.style.strokeDashoffset = CIRC - (CIRC * progress);
  document.getElementById('fsTime').textContent = formatTime(swElapsed);
  document.getElementById('fsMs').textContent = formatMs(swElapsed);
  swRaf = requestAnimationFrame(swTick);
}

function swStart_() {
  swStart = Date.now() - swElapsed;
  swRunning = true;
  swToggle.textContent = '⏸ Pause';
  swLapBtn.disabled = false;
  swRaf = requestAnimationFrame(swTick);
}
function swPause_() {
  cancelAnimationFrame(swRaf);
  swRunning = false;
  swToggle.textContent = '▶ Resume';
}
swToggle.addEventListener('click', () => { swRunning ? swPause_() : swStart_(); });
swReset.addEventListener('click', () => {
  swPause_();
  swElapsed = 0; lapTimes = []; lastLapTime = 0;
  swDisplay.textContent = '00:00'; swMs.textContent = '.000';
  ring.style.strokeDashoffset = CIRC;
  swToggle.textContent = '▶ Start'; swLapBtn.disabled = true;
  lapsTable.style.display = 'none'; lapsList.innerHTML = '';
  document.getElementById('fsTime').textContent = '00:00';
  document.getElementById('fsMs').textContent = '.000';
});
swLapBtn.addEventListener('click', () => {
  if (!swRunning) return;
  const split = swElapsed - lastLapTime;
  lapTimes.push({ total: swElapsed, split });
  lastLapTime = swElapsed;
  renderLaps();
  lapsTable.style.display = 'block';
});

function renderLaps() {
  const splits = lapTimes.map(l => l.split);
  const min = Math.min(...splits), max = Math.max(...splits);
  lapsList.innerHTML = lapTimes.slice().reverse().map((l, i) => {
    const idx = lapTimes.length - i;
    const cls = splits.length > 1 ? (l.split === min ? 'fastest' : l.split === max ? 'slowest' : '') : '';
    return `<div class="lap-row ${cls}">
      <span class="lap-num">${idx}</span>
      <span class="lap-split">${formatTime(l.split)}${formatMs(l.split)}</span>
      <span class="lap-total">${formatTime(l.total)}${formatMs(l.total)}</span>
    </div>`;
  }).join('');
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); swRunning ? swPause_() : swStart_(); }
  if (e.key === 'l' || e.key === 'L') { if (swRunning) swLapBtn.click(); }
  if (e.key === 'r' || e.key === 'R') { swReset.click(); }
});

// ─── FULLSCREEN ──────────────────────────────────────────
const fsEl = document.getElementById('fullscreen');
document.getElementById('fsBtn').addEventListener('click', () => fsEl.classList.add('open'));
function closeFullscreen() { fsEl.classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFullscreen(); });

// ─── TIMERS ──────────────────────────────────────────────
let timerCount = 0;
const timersGrid = document.getElementById('timersGrid');

function stepInput(id, delta, min, max) {
  const el = document.getElementById(id);
  if (!el || el.disabled) return;
  let v = parseInt(el.value) + delta;
  if (v < min) v = max;
  if (v > max) v = min;
  el.value = String(v).padStart(2, '0');
}

function addTimer(minutes, name) {
  const id = ++timerCount;
  const totalSecs = Math.round(minutes * 60);
  let remaining = totalSecs, running = false, interval = null;

  const card = document.createElement('div');
  card.className = 'timer-card';
  card.id = 'timer-' + id;

  function render() {
    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = remaining % 60;
    const display = h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
    const pct = ((totalSecs - remaining) / totalSecs) * 100;
    const urgent = remaining <= 10 && remaining > 0;
    card.querySelector('.timer-display').textContent = display;
    card.querySelector('.timer-display').className = 'timer-display' + (urgent ? ' urgent' : '');
    card.querySelector('.timer-progress-bar').style.width = pct + '%';
    card.querySelector('.play-btn').textContent = running ? '⏸ Pause' : '▶ Start';
    card.classList.toggle('running', running);
  }

  function startTimer() {
    running = true;
    interval = setInterval(() => {
      remaining--;
      render();
      if (remaining <= 0) {
        clearInterval(interval); running = false;
        card.classList.add('complete');
        showNotification('⏰', name || minutes + ' min timer', 'Time\'s up!');
        card.querySelector('.play-btn').textContent = '▶ Start';
        setTimeout(() => card.classList.remove('complete'), 3000);
      }
    }, 1000);
  }
  function pauseTimer() { clearInterval(interval); running = false; render(); }
  function resetTimer() { pauseTimer(); remaining = totalSecs; render(); }
  function removeTimer() { pauseTimer(); card.remove(); }

  card.innerHTML = `
    <div class="timer-card-header">
      <span class="timer-name">${name || minutes + ' min'}</span>
      <button class="timer-btn close" style="width:auto;padding:0 10px;border-radius:6px;font-size:0.75rem" onclick="this.closest('.timer-card').querySelector('.remove-btn').click()">Remove</button>
    </div>
    <div class="timer-setup">
      <div class="time-spin">
        <input type="number" class="time-input" min="0" max="99" value="${Math.floor(minutes)}" id="ti-m-${id}" ${remaining !== totalSecs ? 'disabled' : ''}>
        <div class="spin-btns">
          <button class="spin-btn" onclick="stepInput('ti-m-${id}',1,0,99)">▲</button>
          <button class="spin-btn" onclick="stepInput('ti-m-${id}',-1,0,99)">▼</button>
        </div>
      </div>
      <span class="time-sep">:</span>
      <div class="time-spin">
        <input type="number" class="time-input" min="0" max="59" value="00" id="ti-s-${id}" ${remaining !== totalSecs ? 'disabled' : ''}>
        <div class="spin-btns">
          <button class="spin-btn" onclick="stepInput('ti-s-${id}',1,0,59)">▲</button>
          <button class="spin-btn" onclick="stepInput('ti-s-${id}',-1,0,59)">▼</button>
        </div>
      </div>
    </div>
    <div class="timer-display">${pad(Math.floor(minutes))}:00</div>
    <div class="timer-progress"><div class="timer-progress-bar" style="width:0%"></div></div>
    <div class="timer-controls">
      <button class="timer-btn" style="width:auto;padding:0 14px;border-radius:8px;font-size:0.8rem" onclick="resetTimer_${id}()">↺ Reset</button>
      <button class="timer-btn play-btn" style="width:auto;padding:0 18px;height:40px;border-radius:8px;font-size:0.875rem;font-weight:500" onclick="toggle_${id}()">▶ Start</button>
      <button class="timer-btn remove-btn" style="display:none" onclick="remove_${id}()">Remove</button>
    </div>`;

  // Dynamic functions
  window['toggle_' + id] = () => { running ? pauseTimer() : startTimer(); render(); };
  window['resetTimer_' + id] = resetTimer;
  window['remove_' + id] = removeTimer;

  // Insert before add button
  timersGrid.insertBefore(card, document.getElementById('addTimerBtn'));
  render();
  switchTab('timer');
}

document.getElementById('addTimerBtn').addEventListener('click', () => addTimer(5));
document.querySelectorAll('.preset').forEach(p => {
  p.addEventListener('click', () => addTimer(Number(p.dataset.min)));
});

// ─── COUNTDOWN ───────────────────────────────────────────
const themeGradients = {
  purple: ['linear-gradient(135deg,#1e1b4b,#312e81)', '#c4b5fd', '#7c6af7'],
  teal: ['linear-gradient(135deg,#0f3d35,#134e4a)', '#6ee7b7', '#0d9488'],
  orange: ['linear-gradient(135deg,#431407,#7c2d12)', '#fdba74', '#ea580c'],
  pink: ['linear-gradient(135deg,#500724,#831843)', '#f9a8d4', '#db2777'],
  blue: ['linear-gradient(135deg,#0c1445,#1e3a8a)', '#93c5fd', '#2563eb'],
};
let selectedTheme = 'purple';
document.querySelectorAll('.theme-pick').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.theme-pick').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    selectedTheme = p.dataset.theme;
  });
});

// Set min datetime
const cdDateInput = document.getElementById('cdDate');
const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
cdDateInput.min = now.toISOString().slice(0, 16);
cdDateInput.value = new Date(Date.now() + 86400000 * 7 - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

let countdowns = [];
let cdInterval = null;

document.getElementById('addCountdown').addEventListener('click', () => {
  const name = document.getElementById('cdName').value.trim() || 'My Event';
  const type = document.getElementById('cdType').value;
  const dateStr = document.getElementById('cdDate').value;
  if (!dateStr) { alert('Please select a date!'); return; }
  const target = new Date(dateStr);
  const id = Date.now();
  countdowns.push({ id, name, type, target, theme: selectedTheme });
  renderCountdowns();
  document.getElementById('cdName').value = '';
  if (!cdInterval) cdInterval = setInterval(renderCountdowns, 1000);
});

function renderCountdowns() {
  const list = document.getElementById('countdownsList');
  const empty = document.getElementById('cdEmpty');
  if (!countdowns.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  countdowns.forEach(cd => {
    let card = document.getElementById('cd-' + cd.id);
    if (!card) {
      card = document.createElement('div');
      card.className = 'cd-card';
      card.id = 'cd-' + cd.id;
      const [bg, textColor, accent] = themeGradients[cd.theme] || themeGradients.purple;
      card.style.background = bg; card.style.color = '#fff';
      card.innerHTML = `
        <div class="cd-event">${cd.type} ${cd.name}</div>
        <div class="cd-name" style="color:${textColor}">${cd.name}</div>
        <div class="cd-units">
          <div class="cd-unit"><span class="cd-val" id="cd-d-${cd.id}">--</span><span class="cd-lbl">Days</span></div>
          <div class="cd-unit"><span class="cd-val" id="cd-h-${cd.id}">--</span><span class="cd-lbl">Hours</span></div>
          <div class="cd-unit"><span class="cd-val" id="cd-m-${cd.id}">--</span><span class="cd-lbl">Minutes</span></div>
          <div class="cd-unit"><span class="cd-val" id="cd-s-${cd.id}">--</span><span class="cd-lbl">Seconds</span></div>
        </div>
        <div class="cd-actions">
          <button class="cd-btn" onclick="copyCountdownLink(${cd.id})">🔗 Share</button>
          <button class="cd-btn" onclick="removeCountdown(${cd.id})">✕ Remove</button>
        </div>`;
      list.appendChild(card);
    }
    const diff = cd.target - Date.now();
    if (diff <= 0) {
      ['d','h','m','s'].forEach(u => { const el = document.getElementById('cd-' + u + '-' + cd.id); if(el) el.textContent = '00'; });
    } else {
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      [['d',d],['h',h],['m',m],['s',s]].forEach(([u,v]) => {
        const el = document.getElementById('cd-' + u + '-' + cd.id);
        if (el) el.textContent = pad(v);
      });
    }
  });
}

function removeCountdown(id) {
  countdowns = countdowns.filter(c => c.id !== id);
  const el = document.getElementById('cd-' + id);
  if (el) { el.style.animation = 'fadeIn 0.2s ease reverse'; setTimeout(() => el.remove(), 200); }
  if (!countdowns.length) { document.getElementById('cdEmpty').style.display = 'block'; clearInterval(cdInterval); cdInterval = null; }
}

function copyCountdownLink(id) {
  const cd = countdowns.find(c => c.id === id);
  if (!cd) return;
  const url = `${location.href}?cd=${encodeURIComponent(cd.name)}&t=${cd.target.getTime()}`;
  navigator.clipboard.writeText(url).then(() => showNotification('🔗', 'Link copied!', 'Share it with friends'));
}

// ─── NOTIFICATIONS ───────────────────────────────────────
let notifTimeout = null;
function showNotification(icon, title, sub) {
  let n = document.querySelector('.notification');
  if (n) { n.remove(); clearTimeout(notifTimeout); }
  n = document.createElement('div');
  n.className = 'notification';
  n.innerHTML = `<span class="notif-icon">${icon}</span><div class="notif-text"><div class="notif-title">${title}</div><div class="notif-sub">${sub}</div></div>`;
  document.body.appendChild(n);
  notifTimeout = setTimeout(() => {
    n.classList.add('hide');
    setTimeout(() => n && n.remove(), 300);
  }, 4000);

  // Browser notification
  if (Notification && Notification.permission === 'granted') new Notification(title, { body: sub });
  else if (Notification && Notification.permission !== 'denied') Notification.requestPermission();
}

// ─── INIT ────────────────────────────────────────────────
// Add a demo countdown
setTimeout(() => {
  const nextYear = new Date(); nextYear.setFullYear(nextYear.getFullYear() + 1); nextYear.setMonth(0); nextYear.setDate(1); nextYear.setHours(0,0,0,0);
  countdowns.push({ id: 1, name: 'New Year 2027', type: '🎊', target: nextYear, theme: 'purple' });
  renderCountdowns();
  cdInterval = setInterval(renderCountdowns, 1000);
}, 100);
</script>
</body>
</html>
